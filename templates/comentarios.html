<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />

    <title>Feedback dos Participantes</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body>
    <nav class="navbar navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand" href="/"> 🎭 Eventos da Cidade </a>
      </div>
    </nav>

    <div class="container mt-5">
      <h1>⭐ Feedback dos Participantes</h1>

      <br />

      {% for comentario in comentarios %}

      <div class="card mb-3">
        <div class="card-body">
          <h4>{{comentario[1]}}</h4>

          <hr />

          <p>{{comentario[2]}}</p>
        </div>
      </div>

      {% endfor %}
    </div>
  </body>
</html>
